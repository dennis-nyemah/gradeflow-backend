spring.application.name=gradeflow
# ?? Server ??????????????????????????????????????????????
server.port=8080

# ?? Database ?????????????????????????????????????????????
spring.datasource.url=jdbc:postgresql://localhost:5432/gradeflow
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# ?? JPA / Hibernate ???????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ?? JWT ???????????????????????????????????????????????????
# Generate a strong secret: openssl rand -hex 64
gradeflow.jwt.secret=392ccd94fdfe7490c214fd7868898854fb765d53631fb265d79d8a89292c2cec
gradeflow.jwt.expiration-ms=86400000

# ?? CORS (adjust origin to match your React dev server) ??
gradeflow.cors.allowed-origins=http://localhost:5173,http://localhost:3000
